# SheCare Application Configuration

# Application
spring.application.name=SheCare

# Database Configuration - MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shecare?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.show-sql=${SHOW_SQL:false}


# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# CORS Configuration
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8080}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# JWT Configuration
jwt.secret=${JWT_SECRET:9grK8X8mRwsPOBwsIfxUjdUh/hiTwwhDIwTCuKSwOga3VX1NsqnQUDNkYftlOu3XVJbq7dxwbVVShvS9GL1Eaw==}
jwt.access-token-expiry=${JWT_ACCESS_EXPIRY:900000}
jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY:604800000}
jwt.clock-skew=60

# Logging Configuration
logging.level.root=INFO
logging.level.me.psikuvit.shecare=DEBUG
logging.level.org.springframework.security=DEBUG

